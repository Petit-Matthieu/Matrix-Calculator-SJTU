<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>矩阵工具箱</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f7fa; color: #1a1a2e; min-height: 100vh; padding: 24px; }
  .wrap { max-width: 960px; margin: 0 auto; }

  h1 { text-align: center; font-size: 1.8rem; margin-bottom: 8px; }

  /* ── Tab 切换 ── */
  .tab-bar {
    display: flex; justify-content: center; gap: 0; margin-bottom: 20px;
    border-bottom: 2px solid #e0e4ea;
  }
  .tab-btn {
    padding: 10px 32px; border: none; background: none; font-size: 0.95rem;
    font-weight: 600; color: #888; cursor: pointer; border-bottom: 3px solid transparent;
    margin-bottom: -2px; transition: all 0.15s;
  }
  .tab-btn:hover { color: #4a6cf7; }
  .tab-btn.active { color: #4a6cf7; border-bottom-color: #4a6cf7; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── 通用 ── */
  .card { background: #fff; border: 1px solid #e0e4ea; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card h3 { font-size: 0.95rem; color: #555; margin-bottom: 12px; }

  .btn {
    padding: 8px 18px; border: none; border-radius: 8px; font-size: 0.9rem;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .btn-main { background: #4a6cf7; color: #fff; }
  .btn-main:hover { background: #3b5de7; }
  .btn-main:disabled { background: #a0aec0; cursor: not-allowed; }
  .btn-light { background: #f0f2f5; border: 1px solid #d0d5dd; color: #444; }
  .btn-light:hover { border-color: #4a6cf7; }

  .msg { text-align: center; padding: 8px; margin-bottom: 14px; border-radius: 8px; font-size: 0.88rem; font-weight: 600; }
  .msg.ok { background: #ecfdf5; color: #16a34a; }
  .msg.err { background: #fef2f2; color: #dc2626; }
  .msg.hide { display: none; }

  /* ══════════════════════════════════
     矩阵工具箱
     ══════════════════════════════════ */
  .op-bar { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
  .op-btn {
    padding: 8px 18px; border: 2px solid #d0d5dd; border-radius: 8px; background: #fff;
    color: #444; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .op-btn:hover { border-color: #4a6cf7; color: #4a6cf7; }
  .op-btn.active { background: #4a6cf7; color: #fff; border-color: #4a6cf7; }

  .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
  .row > .card { flex: 1; min-width: 280px; }

  .mat-wrap { display: flex; justify-content: center; overflow-x: auto; padding: 4px 0; }
  .mat-wrap table { border-collapse: separate; border-spacing: 4px; }
  .mat-wrap input {
    width: 64px; height: 34px; text-align: center; border: 1px solid #d0d5dd;
    border-radius: 6px; font-size: 0.9rem; font-family: 'Consolas', monospace;
    color: #1a1a2e; background: #f9fafb; padding: 0 4px;
  }
  .mat-wrap input:focus { outline: none; border-color: #4a6cf7; box-shadow: 0 0 0 2px rgba(74,108,247,0.15); background: #fff; }

  .mat-disp { display: inline-block; position: relative; padding: 4px 14px; margin: 2px 4px; }
  .mat-disp::before, .mat-disp::after { content: ''; position: absolute; top: 0; bottom: 0; width: 3px; background: #4a6cf7; border-radius: 2px; }
  .mat-disp::before { left: 0; } .mat-disp::after { right: 0; }
  .mat-disp.green::before, .mat-disp.green::after { background: #22c55e; }
  .mat-disp.orange::before, .mat-disp.orange::after { background: #f59e0b; }
  .mat-disp table { border-collapse: collapse; }
  .mat-disp td { padding: 2px 10px; text-align: right; font-family: 'Consolas', monospace; font-size: 0.9rem; white-space: nowrap; }

  .mat-label { font-weight: 700; margin-right: 4px; color: #4a6cf7; vertical-align: middle; }
  .mat-label.green { color: #22c55e; } .mat-label.orange { color: #f59e0b; }
  .eq-row { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 8px; padding: 10px 0; }
  .sym { font-size: 1.4rem; color: #999; font-weight: 300; }
  .mat-group { display: inline-flex; align-items: center; gap: 4px; }

  .btn-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; justify-content: center; }

  .dim-bar { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 16px; color: #555; font-size: 0.9rem; }
  .dim-bar select { padding: 5px 8px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 0.9rem; background: #fff; color: #1a1a2e; }

  .scalar-in {
    width: 80px; height: 34px; text-align: center; border: 1px solid #d0d5dd;
    border-radius: 6px; font-size: 1rem; font-weight: 700; font-family: 'Consolas', monospace; color: #f59e0b;
  }
  .scalar-in:focus { outline: none; border-color: #f59e0b; }

  .result { display: none; } .result.show { display: block; }

  .paste-box {
    width: 100%; min-height: 70px; border: 1px dashed #d0d5dd; border-radius: 8px;
    padding: 8px; font-family: 'Consolas', monospace; font-size: 0.85rem; resize: vertical; color: #1a1a2e;
  }
  .paste-box:focus { outline: none; border-color: #4a6cf7; }
  .hint { font-size: 0.78rem; color: #999; margin-top: 4px; }

  .steps { list-style: none; }
  .steps li {
    padding: 6px 10px; margin-bottom: 4px; background: #f8f9fb; border-left: 3px solid #4a6cf7;
    border-radius: 0 6px 6px 0; font-size: 0.85rem; font-family: 'Consolas', monospace; line-height: 1.5;
  }
  .steps li b { color: #4a6cf7; }
  hr.sep { border: none; border-top: 1px solid #e8eaed; margin: 14px 0; }

  /* ── 可折叠区域 ── */
  details.fold { margin-bottom: 12px; }
  details.fold > summary {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border: 1px dashed #d0d5dd; border-radius: 8px;
    font-size: 0.85rem; font-weight: 600; color: #666; cursor: pointer;
    list-style: none; transition: all 0.15s;
  }
  details.fold > summary::-webkit-details-marker { display: none; }
  details.fold > summary::before { content: '▸'; font-size: 0.8rem; transition: transform 0.15s; }
  details.fold[open] > summary::before { transform: rotate(90deg); }
  details.fold > summary:hover { border-color: #4a6cf7; color: #4a6cf7; }
  details.fold .fold-body {
    margin-top: 10px; padding: 14px; background: #f9fafb;
    border: 1px solid #e8eaed; border-radius: 8px;
  }

  /* ══════════════════════════════════
     性能测试
     ══════════════════════════════════ */
  .ctrl-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; justify-content: center; margin-bottom: 12px; }
  .ctrl-row label { font-size: 0.9rem; color: #555; font-weight: 600; }
  .ctrl-row select, .ctrl-row input { padding: 6px 10px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 0.9rem; background: #fff; }
  .ctrl-row input[type=number] { width: 80px; text-align: center; }

  .warn-box { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; margin-bottom: 12px; text-align: center; }

  .result-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  .result-table th { background: #f0f2f5; padding: 12px 16px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #e0e4ea; white-space: nowrap; }
  .result-table td { padding: 14px 16px; border-bottom: 1px solid #f0f2f5; text-align: left; }
  .result-table tr:hover td { background: #f8f9fb; }
  .result-table .ver { font-weight: 700; font-size: 1rem; white-space: nowrap; }
  .result-table .tech { color: #1a1a2e; font-size: 0.95rem; font-weight: 700; }
  .result-table .time { font-family: 'Consolas', monospace; font-weight: 700; font-size: 1.05rem; }
  .result-table .speed { font-family: 'Consolas', monospace; font-weight: 700; font-size: 1.1rem; }
  .result-table .fast { color: #16a34a; }
  .result-table .slow { color: #dc2626; }
  .result-table .bar-cell { width: 35%; text-align: left; }
  .bar-wrap { display: flex; align-items: center; height: 26px; }
  .bar-label { width: 80px; text-align: right; font-family: 'Consolas', monospace; font-weight: 700; font-size: 1.05rem; white-space: nowrap; flex-shrink: 0; padding-right: 10px; }
  .bar-outer { flex: 1; background: #f0f2f5; border-radius: 6px; height: 100%; overflow: hidden; }
  .bar { height: 100%; border-radius: 6px; transition: width 0.4s ease; min-width: 2px; }

  .rank-badge { display: inline-block; width: 22px; height: 22px; border-radius: 50%; font-size: 0.72rem; font-weight: 700; line-height: 22px; text-align: center; margin-right: 6px; color: #fff; }
  .rank-1 { background: #ef4444; } .rank-2 { background: #f59e0b; } .rank-3 { background: #eab308; } .rank-4 { background: #22c55e; }

  .progress-wrap { display: none; margin: 12px 0; }
  .progress-wrap.show { display: block; }
  .progress-bar-outer { background: #e5e7eb; border-radius: 8px; height: 28px; overflow: hidden; position: relative; }
  .progress-bar-inner { height: 100%; border-radius: 8px; background: #4a6cf7; transition: width 0.3s ease; }
  .progress-label { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.2); pointer-events: none; }
  .progress-detail { font-size: 0.82rem; color: #666; text-align: center; margin-top: 4px; }
</style>
</head>
<body>

<div class="wrap">
  <h1>矩阵工具箱</h1>

  <!-- Tab 切换 -->
  <div class="tab-bar">
    <button class="tab-btn" onclick="switchTab('calc')">📊 矩阵计算</button>
    <button class="tab-btn active" onclick="switchTab('bench')">⚡ 乘法性能对比</button>
  </div>

  <!-- ══════════ 矩阵计算 Tab ══════════ -->
  <div class="tab-panel" id="panel-calc">
    <div id="msg" class="msg hide"></div>
    <div class="op-bar" id="opBar"></div>
    <div class="card" id="extraInput" style="display:none;"></div>
    <div class="row" id="inputRow">
      <div class="card" id="cardA">
        <h3 id="labelA">矩阵 A</h3>
        <div class="mat-wrap" id="inputA"></div>
        <div class="btn-bar">
          <button class="btn btn-light" onclick="fillId('A')">单位阵</button>
          <button class="btn btn-light" onclick="fillRand('A')">随机</button>
          <button class="btn btn-light" onclick="fillClear('A')">清空</button>
        </div>
      </div>
      <div class="card" id="cardB">
        <h3 id="labelB">矩阵 B</h3>
        <div class="mat-wrap" id="inputB"></div>
        <div class="btn-bar">
          <button class="btn btn-light" onclick="fillId('B')">单位阵</button>
          <button class="btn btn-light" onclick="fillRand('B')">随机</button>
          <button class="btn btn-light" onclick="fillClear('B')">清空</button>
        </div>
      </div>
    </div>
    <details class="fold" id="pasteCard">
      <summary>📋 粘贴导入矩阵</summary>
      <div class="fold-body">
        <textarea class="paste-box" id="pasteArea" placeholder="粘贴表格数据，空格/制表符/逗号分隔，每行一行"></textarea>
        <div class="hint">从 Excel 或网页表格直接复制粘贴。目标：
          <select id="pasteTarget" style="border:1px solid #d0d5dd;border-radius:4px;padding:2px 6px;">
            <option value="A">A</option><option value="B">B</option>
          </select>
          <button class="btn btn-light" style="margin-left:8px;" onclick="doPaste()">导入</button>
        </div>
      </div>
    </details>
    <details class="fold" id="bQuickFold" style="display:none;">
      <summary>✏️ 快捷输入向量 b</summary>
      <div class="fold-body" id="bQuickBody"></div>
    </details>
    <div class="dim-bar">
      <span>A：</span><select id="rA" onchange="onDimChange()"></select> × <select id="cA" onchange="onDimChange()"></select>
      <span id="dimBLabel" style="margin-left:16px;">B：</span><select id="rB" onchange="onDimChange()"></select>
      <span id="dimBTimes">×</span><select id="cB" onchange="onDimChange()"></select>
      <button class="btn btn-main" onclick="run()">▶ 计算</button>
    </div>
    <div class="result" id="resultBox">
      <div class="card">
        <h3 id="resultTitle">结果</h3>
        <div class="eq-row" id="eqArea"></div>
        <hr class="sep">
        <div class="mat-wrap" id="resultDisp"></div>
        <div id="extraResult"></div>
      </div>
      <div class="card" id="stepsCard" style="display:none;">
        <h3>步骤</h3>
        <ul class="steps" id="stepsList"></ul>
      </div>
    </div>
  </div>

  <!-- ══════════ 性能测试 Tab ══════════ -->
  <div class="tab-panel active" id="panel-bench">
    <div id="bm_msg" class="msg hide" style="text-align:left;"></div>
    <div class="card">
      <h3>测试配置</h3>
      <div class="ctrl-row">
        <label>矩阵规模 n：</label>
        <select id="bm_sizeSelect">
          <option value="100" selected>100 × 100</option>
          <option value="200">200 × 200</option>
          <option value="500">500 × 500</option>
          <option value="1000">1000 × 1000</option>
          <option value="1500">1500 × 1500</option>
          <option value="custom">自定义…</option>
        </select>
        <input type="number" id="bm_customSize" placeholder="n" min="1" max="1500" style="display:none;">
        <label>重复：</label>
        <input type="number" id="bm_repeatCount" value="1" min="1" max="50">
      </div>
      <div id="bm_largeWarn" class="warn-box" style="display:none;">
        ⚠️ n ≥ 1000 时 ijk 朴素乘法可能非常慢（O(n³)），请耐心等待。
      </div>
      <div id="bm_memInfo" style="text-align:center;font-size:0.82rem;color:#888;margin-bottom:8px;"></div>
      <div style="text-align:center;margin-top:4px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-main" id="bm_runBtn" onclick="runBenchmark()">▶ 开始测试</button>
        <button class="btn btn-light" id="bm_previewBtn" onclick="previewMatrix()">👁 预览随机矩阵</button>
      </div>
      <div id="bm_preview" style="display:none;margin-top:12px;"></div>
    </div>
    <div class="card" id="bm_resultCard" style="display:none;">
      <h3 id="bm_resultTitle">测试结果</h3>
      <div class="progress-wrap" id="bm_progressWrap">
        <div class="progress-bar-outer">
          <div class="progress-bar-inner" id="bm_progressBar" style="width:0%"></div>
          <div class="progress-label" id="bm_progressLabel">0%</div>
        </div>
        <div class="progress-detail" id="bm_progressDetail"></div>
      </div>
      <table class="result-table">
        <thead>
          <tr><th>版本</th><th>关键技术</th><th>加速比</th><th class="bar-cell">耗时对比</th></tr>
        </thead>
        <tbody id="bm_resultBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ─── Tab 切换 ───
function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (id === 'calc' ? 0 : 1) === i);
  });
  document.getElementById('panel-calc').classList.toggle('active', id === 'calc');
  document.getElementById('panel-bench').classList.toggle('active', id === 'bench');
}

// ══════════════════════════════════════
//  矩阵计算
// ══════════════════════════════════════
const OPS = [
  { id: 'add',    label: 'A + B  加法',   useB: true },
  { id: 'sub',    label: 'A − B  减法',   useB: true },
  { id: 'mul',    label: 'A × B  乘法',   useB: true },
  { id: 'scalar', label: 'k · A  标量乘', useB: false },
  { id: 'trans',  label: 'Aᵀ  转置',     useB: false },
  { id: 'det',    label: 'det(A) 行列式', useB: false },
  { id: 'lu',     label: 'LU 分解',       useB: false },
  { id: 'solve',  label: 'Ax=b 求解',     useB: true },
];
let curOp = 'add', nA = [3,3], nB = [3,3], savedNBCol = 3;

function init() { buildOpBar(); buildDimSelects(); renderInputs(); updateVisibility(); }
function buildOpBar() {
  document.getElementById('opBar').innerHTML = OPS.map(o =>
    `<button class="op-btn ${o.id===curOp?'active':''}" onclick="pickOp('${o.id}')">${o.label}</button>`
  ).join('');
}
function pickOp(id) { curOp = id; buildOpBar(); updateVisibility(); }

function updateVisibility() {
  const op = OPS.find(o => o.id === curOp);
  document.getElementById('cardB').style.display = op.useB ? '' : 'none';
  const extra = document.getElementById('extraInput');
  const bFold = document.getElementById('bQuickFold');
  if (curOp === 'scalar') {
    extra.style.display = '';
    bFold.style.display = 'none';
    extra.innerHTML = `<h3>标量 k</h3><div style="text-align:center;padding:8px;">
      <span style="font-size:1.2rem;margin-right:8px;">k =</span>
      <input type="number" step="any" id="scalarK" value="2" class="scalar-in"></div>`;
  } else if (curOp === 'solve') {
    extra.style.display = 'none';
    bFold.style.display = '';
    bFold.open = false;
    document.getElementById('bQuickBody').innerHTML = `
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <input type="text" id="bQuickInput" placeholder="例：1, 2, 3 或 1 2 3"
          style="flex:1;min-width:200px;height:34px;border:1px solid #d0d5dd;border-radius:6px;padding:0 10px;font-family:Consolas,monospace;font-size:0.9rem;">
        <button class="btn btn-light" onclick="applyBQuick()">填入</button>
        <button class="btn btn-light" onclick="fillOnesB()">全 1</button>
        <button class="btn btn-light" onclick="fillRandB()">随机</button>
      </div>
      <div class="hint">输入 ${nA[0]} 个数值，逗号或空格分隔，点击"填入"写入上方网格</div>`;
  } else { extra.style.display='none'; extra.innerHTML=''; bFold.style.display='none'; }
  const showB = curOp==='add'||curOp==='sub'||curOp==='mul'||curOp==='solve';
  document.getElementById('dimBLabel').style.display = showB?'':'none';
  document.getElementById('rB').style.display = showB?'':'none';
  document.getElementById('dimBTimes').style.display = showB&&curOp!=='solve'?'':'none';
  document.getElementById('cB').style.display = showB&&curOp!=='solve'?'':'none';
  const labels = { add:['矩阵 A','矩阵 B'],sub:['矩阵 A','矩阵 B'],mul:['矩阵 A','矩阵 B'],
    scalar:['矩阵 A',''],trans:['矩阵 A',''],det:['矩阵 A（方阵）',''],
    lu:['矩阵 A（方阵）',''],solve:['矩阵 A（方阵）','向量 b'] };
  const [la,lb] = labels[curOp]||['A','B'];
  document.getElementById('labelA').textContent = la;
  document.getElementById('labelB').textContent = lb;
  // 切操作时自动同步维度
  if (curOp==='add'||curOp==='sub') {
    nB=[nA[0],nA[1]]; document.getElementById('rB').value=nA[0]; document.getElementById('cB').value=nA[1];
  } else if (curOp==='mul') {
    nB[0]=nA[1]; document.getElementById('rB').value=nA[1];
  } else if (curOp==='det'||curOp==='lu'||curOp==='solve') {
    nA[1]=nA[0]; document.getElementById('cA').value=nA[0];
  }
  if (curOp==='solve') {
    savedNBCol = nB[1] > 1 ? nB[1] : savedNBCol;
    nB = [nA[0], 1];
    document.getElementById('rB').value = nA[0];
    renderGrid('inputB', 'b', nB[0], 1);
  } else {
    if (savedNBCol > 1) { nB[1] = savedNBCol; document.getElementById('cB').value = savedNBCol; }
    renderGrid('inputB', 'b', nB[0], nB[1]);
  }
}

function buildDimSelects() {
  let opts=''; for(let i=1;i<=12;i++) opts+=`<option value="${i}">${i}</option>`;
  ['rA','cA','rB','cB'].forEach(id=>{ document.getElementById(id).innerHTML=opts; document.getElementById(id).value=3; });
}
function onDimChange() {
  let rA = parseInt(document.getElementById('rA').value);
  let cA = parseInt(document.getElementById('cA').value);
  let rB = parseInt(document.getElementById('rB').value);
  let cB = parseInt(document.getElementById('cB').value);

  switch (curOp) {
    case 'add': case 'sub':
      // AB 同维度：A 行列变了 → B 跟着变；B 变了 → A 跟着变
      // 判断是哪个 select 触发的（通过比较当前 DOM 值和上一次的 nA/nB）
      if (rA !== nA[0] || cA !== nA[1]) { rB = rA; cB = cA; document.getElementById('rB').value = rB; document.getElementById('cB').value = cB; }
      else { rA = rB; cA = cB; document.getElementById('rA').value = rA; document.getElementById('cA').value = cA; }
      break;
    case 'mul':
      // A 列 = B 行：A 列变了 → B 行跟着变；B 行变了 → A 列跟着变
      if (cA !== nA[1]) { rB = cA; document.getElementById('rB').value = rB; }
      else if (rB !== nB[0]) { cA = rB; document.getElementById('cA').value = cA; }
      break;
    case 'scalar': case 'trans':
      // 只用 A，不涉及 B 维度
      break;
    case 'det': case 'lu':
      // 方阵：行列必须一致，改哪个另一个都跟着变
      if (rA !== nA[0]) { cA = rA; document.getElementById('cA').value = cA; }
      else if (cA !== nA[1]) { rA = cA; document.getElementById('rA').value = rA; }
      break;
    case 'solve':
      // 方阵 + b 是列向量：rA = cA = rB，改任意一个三个都同步
      if (rA !== nA[0]) { cA = rA; rB = rA; document.getElementById('cA').value = cA; document.getElementById('rB').value = rB; }
      else if (cA !== nA[1]) { rA = cA; rB = cA; document.getElementById('rA').value = rA; document.getElementById('rB').value = rB; }
      else if (rB !== nB[0]) { rA = rB; cA = rB; document.getElementById('rA').value = rA; document.getElementById('cA').value = cA; }
      break;
  }

  nA = [parseInt(document.getElementById('rA').value), parseInt(document.getElementById('cA').value)];
  nB = [parseInt(document.getElementById('rB').value), curOp==='solve' ? 1 : parseInt(document.getElementById('cB').value)];
  renderInputs();
}
function renderInputs() { renderGrid('inputA','a',nA[0],nA[1]); renderGrid('inputB','b',nB[0],nB[1]); }
function renderGrid(container,prefix,r,c) {
  let h='<table>'; for(let i=0;i<r;i++){h+='<tr>';for(let j=0;j<c;j++)h+=`<td><input id="${prefix}_${i}_${j}" type="number" step="any"></td>`;h+='</tr>';} h+='</table>';
  document.getElementById(container).innerHTML=h;
}
function readMat(prefix,r,c) {
  const M=[]; for(let i=0;i<r;i++){M[i]=[];for(let j=0;j<c;j++)M[i][j]=parseFloat(document.getElementById(`${prefix}_${i}_${j}`).value)||0;} return M;
}
function setMat(prefix,M) {
  for(let i=0;i<M.length;i++) for(let j=0;j<M[0].length;j++){const el=document.getElementById(`${prefix}_${i}_${j}`);if(el)el.value=M[i][j];}
}
function fillId(which){const[r,c]=which==='A'?nA:nB;const n=Math.min(r,c);const M=Array.from({length:r},()=>Array(c).fill(0));for(let i=0;i<n;i++)M[i][i]=1;setMat(which.toLowerCase(),M);}
function fillRand(which){
  const[r,c]=which==='A'?nA:nB;
  const M=Array.from({length:r},()=>Array.from({length:c},()=>Math.floor(Math.random()*19)-9));
  // det/lu/solve 时保证 A[0][0] ≠ 0，否则分解直接失败
  if(which==='A'&&(curOp==='det'||curOp==='lu'||curOp==='solve')&&M[0][0]===0) M[0][0]=Math.floor(Math.random()*9)+1;
  setMat(which.toLowerCase(),M);
}
function fillClear(which){const[r,c]=which==='A'?nA:nB;for(let i=0;i<r;i++)for(let j=0;j<c;j++){const el=document.getElementById(`${which.toLowerCase()}_${i}_${j}`);if(el)el.value='';}}
function applyBQuick(){const raw=document.getElementById('bQuickInput').value.trim();if(!raw)return showMsg('请输入 b 的值',true);const vals=raw.split(/[\t,，]+|\s+/).filter(Boolean).map(Number);if(vals.some(isNaN))return showMsg('包含非数字',true);if(vals.length<nA[0])return showMsg(`需要 ${nA[0]} 个值，只输入了 ${vals.length} 个`,true);for(let i=0;i<nA[0];i++){const el=document.getElementById(`b_${i}_0`);if(el)el.value=vals[i];}showMsg(`已填入 b = [${vals.slice(0,nA[0]).join(', ')}]`,false);}
function fillOnesB(){for(let i=0;i<nA[0];i++){const el=document.getElementById(`b_${i}_0`);if(el)el.value=1;}showMsg('b 已填充为全 1',false);}
function fillRandB(){for(let i=0;i<nA[0];i++){const el=document.getElementById(`b_${i}_0`);if(el)el.value=Math.floor(Math.random()*19)-9;}showMsg('b 已随机填充',false);}
function doPaste(){const raw=document.getElementById('pasteArea').value.trim();if(!raw)return showMsg('粘贴内容为空',true);const lines=raw.split(/\r?\n/).filter(l=>l.trim());const data=[];let maxC=0;for(const line of lines){const parts=line.trim().split(/[\t,]+|\s+/).filter(Boolean).map(Number);if(parts.some(isNaN))return showMsg('包含非数字',true);maxC=Math.max(maxC,parts.length);data.push(parts);}data.forEach(row=>{while(row.length<maxC)row.push(0);});const target=document.getElementById('pasteTarget').value;if(target==='A'){nA=[data.length,maxC];document.getElementById('rA').value=Math.min(nA[0],12);document.getElementById('cA').value=Math.min(nA[1],12);}else{nB=[data.length,maxC];document.getElementById('rB').value=Math.min(nB[0],12);document.getElementById('cB').value=Math.min(nB[1],12);}renderInputs();setMat(target.toLowerCase(),data);showMsg(`已导入 ${data.length}×${maxC} 到 ${target}`,false);}

// 矩阵运算
function mAdd(A,B){if(A.length!==B.length||A[0].length!==B[0].length)return'维度不匹配';return A.map((row,i)=>row.map((v,j)=>v+B[i][j]));}
function mSub(A,B){if(A.length!==B.length||A[0].length!==B[0].length)return'维度不匹配';return A.map((row,i)=>row.map((v,j)=>v-B[i][j]));}
function mMul(A,B){if(A[0].length!==B.length)return`A的列(${A[0].length}) ≠ B的行(${B.length})`;const C=Array.from({length:A.length},()=>Array(B[0].length).fill(0));for(let i=0;i<A.length;i++)for(let j=0;j<B[0].length;j++)for(let k=0;k<A[0].length;k++)C[i][j]+=A[i][k]*B[k][j];return C;}
function mScale(k,A){return A.map(row=>row.map(v=>k*v));}
function mT(A){return A[0].map((_,j)=>A.map(row=>row[j]));}
function mDet(A){const n=A.length;if(n!==A[0].length)return{err:'非方阵'};const M=A.map(r=>[...r]);let sign=1;for(let k=0;k<n;k++){let piv=-1;for(let i=k;i<n;i++)if(Math.abs(M[i][k])>1e-14){piv=i;break;}if(piv===-1)return{val:0};if(piv!==k){[M[k],M[piv]]=[M[piv],M[k]];sign*=-1;}for(let i=k+1;i<n;i++){const f=M[i][k]/M[k][k];for(let j=k;j<n;j++)M[i][j]-=f*M[k][j];}}let d=sign;for(let i=0;i<n;i++)d*=M[i][i];return{val:d};}
function mLU(A,tol=1e-12){const n=A.length;if(n!==A[0].length)return{err:'非方阵'};const L=Array.from({length:n},(_,i)=>Array.from({length:n},(_,j)=>i===j?1:0));const U=Array.from({length:n},()=>Array(n).fill(0));const steps=[];for(let k=0;k<n;k++){for(let j=k;j<n;j++){let s=0;for(let t=0;t<k;t++)s+=L[k][t]*U[t][j];U[k][j]=A[k][j]-s;}const piv=U[k][k];if(Math.abs(piv)<tol)return{err:`U[${k}][${k}]≈0，矩阵奇异`};steps.push(`<b>k=${k}</b> 主元 U[${k}][${k}]=${f(piv)}`);for(let i=k+1;i<n;i++){let s=0;for(let t=0;t<k;t++)s+=L[i][t]*U[t][k];L[i][k]=(A[i][k]-s)/piv;}}return{L,U,steps};}
function fwdSub(L,b,tol=1e-12){const n=L.length,y=[];for(let i=0;i<n;i++){let s=b[i];for(let j=0;j<i;j++)s-=L[i][j]*y[j];if(Math.abs(L[i][i])<tol)return{err:`L[${i}][${i}]≈0`};y[i]=s/L[i][i];}return{y};}
function bkSub(U,y,tol=1e-12){const n=U.length,x=[];for(let i=n-1;i>=0;i--){let s=y[i];for(let j=i+1;j<n;j++)s-=U[i][j]*x[j];if(Math.abs(U[i][i])<tol)return{err:`U[${i}][${i}]≈0`};x[i]=s/U[i][i];}return{x};}
function f(v){if(Math.abs(v)<1e-14)return'0';if(Number.isInteger(v))return v.toString();return parseFloat(v.toFixed(6)).toString();}

function dispMat(label,M,cls=''){let h=`<div class="mat-group"><span class="mat-label ${cls}">${label}</span><div class="mat-disp ${cls}"><table>`;for(const row of M){h+='<tr>'+row.map(v=>`<td>${f(v)}</td>`).join('')+'</tr>';}h+='</table></div></div>';return h;}
function dispVec(label,v,cls=''){return dispMat(label,v.map(x=>[x]),cls);}
function renderDisp(container,M,cls=''){let h=`<div class="mat-disp ${cls}"><table>`;for(const row of M)h+='<tr>'+row.map(v=>`<td>${f(v)}</td>`).join('')+'</tr>';h+='</table></div>';document.getElementById(container).innerHTML=h;}

function showMsg(text,isErr){const el=document.getElementById('msg');el.className=`msg ${isErr?'err':'ok'}`;el.textContent=text;}

function run() {
  const A=readMat('a',nA[0],nA[1]),B=readMat('b',nB[0],nB[1]);
  const box=document.getElementById('resultBox'),eq=document.getElementById('eqArea'),extra=document.getElementById('extraResult');
  const stepsCard=document.getElementById('stepsCard'),stepsList=document.getElementById('stepsList');
  extra.innerHTML='';stepsCard.style.display='none';
  try {
    switch(curOp){
      case'add':case'sub':case'mul':{const res=curOp==='add'?mAdd(A,B):curOp==='sub'?mSub(A,B):mMul(A,B);if(typeof res==='string'){showMsg(res,true);return;}const sym=curOp==='add'?'+':curOp==='sub'?'−':'×';eq.innerHTML=dispMat('A',A)+`<span class="sym">${sym}</span>`+dispMat('B',B,'green')+`<span class="sym">=</span>`+dispMat('R',res,'orange');renderDisp('resultDisp',res,'orange');document.getElementById('resultTitle').textContent=`结果：A ${sym} B`;break;}
      case'scalar':{const k=parseFloat(document.getElementById('scalarK').value)||0;const res=mScale(k,A);eq.innerHTML=`<span style="font-size:1.4rem;font-weight:700;color:#f59e0b;margin-right:4px;">${f(k)}</span>`+`<span class="sym">·</span>`+dispMat('A',A)+`<span class="sym">=</span>`+dispMat('R',res,'orange');renderDisp('resultDisp',res,'orange');document.getElementById('resultTitle').textContent=`结果：${f(k)} · A`;break;}
      case'trans':{const res=mT(A);eq.innerHTML=dispMat('A',A)+`<span class="sym">→</span>`+dispMat('Aᵀ',res,'orange');renderDisp('resultDisp',res,'orange');document.getElementById('resultTitle').textContent='结果：Aᵀ';break;}
      case'det':{const d=mDet(A);if(d.err){showMsg(d.err,true);return;}eq.innerHTML=dispMat('A',A);extra.innerHTML=`<div style="text-align:center;font-size:1.3rem;font-weight:700;padding:12px;">det(A) = <span style="color:#4a6cf7;">${f(d.val)}</span></div>`;document.getElementById('resultTitle').textContent='行列式';break;}
      case'lu':{const r=mLU(A);if(r.err){showMsg(r.err,true);return;}eq.innerHTML=dispMat('A',A);extra.innerHTML=`<div class="eq-row">${dispMat('L',r.L)}<span class="sym">×</span>${dispMat('U',r.U,'green')}</div>`;const LU=mMul(r.L,r.U);let maxE=0;for(let i=0;i<A.length;i++)for(let j=0;j<A[0].length;j++)maxE=Math.max(maxE,Math.abs(LU[i][j]-A[i][j]));extra.innerHTML+=`<div style="text-align:center;font-size:0.85rem;color:${maxE<1e-10?'#16a34a':'#dc2626'};padding:6px;">${maxE<1e-10?'✓':'✗'} ‖LU−A‖∞ = ${maxE.toExponential(2)}</div>`;stepsCard.style.display='';stepsList.innerHTML=r.steps.map(s=>`<li>${s}</li>`).join('');document.getElementById('resultTitle').textContent='LU 分解';break;}
      case'solve':{const n=A.length;const b=[];for(let i=0;i<n;i++)b[i]=B[i][0]||0;const lu=mLU(A);if(lu.err){showMsg('LU: '+lu.err,true);return;}const fy=fwdSub(lu.L,b);if(fy.err){showMsg('前代: '+fy.err,true);return;}const bx=bkSub(lu.U,fy.y);if(bx.err){showMsg('回代: '+bx.err,true);return;}eq.innerHTML=dispMat('A',A)+`<span class="sym">×</span>`+dispVec('x',bx.x,'green')+`<span class="sym">=</span>`+dispVec('b',b,'orange');extra.innerHTML=`<div class="eq-row">${dispVec('解 x',bx.x,'green')}</div>`;document.getElementById('resultTitle').textContent='Ax = b 求解结果';break;}
    }
    box.classList.add('show');showMsg('计算完成 ✓',false);box.scrollIntoView({behavior:'smooth',block:'nearest'});
  } catch(e){showMsg('计算出错: '+e.message,true);}
}

// ══════════════════════════════════════
//  性能测试
// ══════════════════════════════════════
const MUL_VERSIONS = [
  { id: 'ijk',       ver: 'IJK',       tech: 'i-j-k 三重循环' },
  { id: 'ikj',       ver: 'IKJ',       tech: '循环重排 i-k-j' },
  { id: 'blocked',   ver: 'Blocked',   tech: '64×64 分块 + 4 路展开' },
  { id: 'optimized', ver: 'Optimized', tech: '4×4 微内核 + 分块' },
];

function randMat(n){const d=new Float64Array(n*n);for(let i=0;i<d.length;i++)d[i]=Math.random()*20-10;return d;}

function mulIJK(n,A,B){const C=new Float64Array(n*n);for(let i=0;i<n;i++)for(let j=0;j<n;j++){let s=0;for(let k=0;k<n;k++)s+=A[i*n+k]*B[k*n+j];C[i*n+j]=s;}return C;}
function mulIKJ(n,A,B){const C=new Float64Array(n*n);for(let i=0;i<n;i++)for(let k=0;k<n;k++){const a=A[i*n+k];for(let j=0;j<n;j++)C[i*n+j]+=a*B[k*n+j];}return C;}
function mulBlocked(n,A,B){const C=new Float64Array(n*n);const BS=64;for(let ii=0;ii<n;ii+=BS){const iE=Math.min(ii+BS,n);for(let kk=0;kk<n;kk+=BS){const kE=Math.min(kk+BS,n);for(let jj=0;jj<n;jj+=BS){const jE=Math.min(jj+BS,n);for(let i=ii;i<iE;i++){const aR=i*n,cR=i*n;for(let k=kk;k<kE;k++){const a=A[aR+k],bR=k*n;let j=jj;for(;j+3<jE;j+=4){C[cR+j]+=a*B[bR+j];C[cR+j+1]+=a*B[bR+j+1];C[cR+j+2]+=a*B[bR+j+2];C[cR+j+3]+=a*B[bR+j+3];}for(;j<jE;j++)C[cR+j]+=a*B[bR+j];}}}}}return C;}
function mulOptimized(n,A,B){const C=new Float64Array(n*n);const BS=64;function micro(aO,aS,bO,bS,cO,cS,inner){let c00=0,c01=0,c02=0,c03=0,c10=0,c11=0,c12=0,c13=0,c20=0,c21=0,c22=0,c23=0,c30=0,c31=0,c32=0,c33=0;const a1=aO+aS,a2=aO+2*aS,a3=aO+3*aS;for(let k=0;k<inner;k++){const bR=bO+k*bS;const b0=B[bR],b1=B[bR+1],b2=B[bR+2],b3=B[bR+3];const a0=A[aO+k],a1k=A[a1+k],a2k=A[a2+k],a3k=A[a3+k];c00+=a0*b0;c01+=a0*b1;c02+=a0*b2;c03+=a0*b3;c10+=a1k*b0;c11+=a1k*b1;c12+=a1k*b2;c13+=a1k*b3;c20+=a2k*b0;c21+=a2k*b1;c22+=a2k*b2;c23+=a2k*b3;c30+=a3k*b0;c31+=a3k*b1;c32+=a3k*b2;c33+=a3k*b3;}let c=cO;C[c]=c00;C[c+1]=c01;C[c+2]=c02;C[c+3]=c03;c+=cS;C[c]=c10;C[c+1]=c11;C[c+2]=c12;C[c+3]=c13;c+=cS;C[c]=c20;C[c+1]=c21;C[c+2]=c22;C[c+3]=c23;c+=cS;C[c]=c30;C[c+1]=c31;C[c+2]=c32;C[c+3]=c33;}function tail(i0,i1,j0,j1){for(let i=i0;i<i1;i++){const cR=i*n;for(let j=j0;j<j1;j++){let s=0;for(let k=0;k<n;k++)s+=A[i*n+k]*B[k*n+j];C[cR+j]=s;}}}for(let jj=0;jj<n;jj+=BS){const jE=Math.min(jj+BS,n);for(let ii=0;ii<n;ii+=BS){const iE=Math.min(ii+BS,n);let i=ii;for(;i+3<iE;i+=4){let j=jj;for(;j+3<jE;j+=4)micro(i*n,n,j,n,i*n+j,n,n);if(j<jE)tail(i,i+4,j,jE);}if(i<iE)tail(i,iE,jj,jE);}}return C;}

const MUL_FUNCS={ijk:mulIJK,ikj:mulIKJ,blocked:mulBlocked,optimized:mulOptimized};

document.getElementById('bm_sizeSelect').addEventListener('change',function(){document.getElementById('bm_customSize').style.display=this.value==='custom'?'':'none';bmUpdateWarn();});
document.getElementById('bm_customSize').addEventListener('input',bmUpdateWarn);

function bmShowMsg(text,isErr){const el=document.getElementById('bm_msg');el.className=`msg ${isErr?'err':'ok'}`;el.textContent=text;}
function bmFmt(ms){if(ms<1)return(ms*1000).toFixed(0)+' μs';if(ms<1000)return ms.toFixed(1)+' ms';return(ms/1000).toFixed(2)+' s';}

function bmSetProgress(pct,detail){document.getElementById('bm_progressBar').style.width=pct+'%';document.getElementById('bm_progressLabel').textContent=pct.toFixed(1)+'%';if(detail)document.getElementById('bm_progressDetail').textContent=detail;}

async function runBenchmark(){
  const n=bmGetN();if(!n||n<2)return bmShowMsg('请输入有效的矩阵规模',true);if(n>1500)return bmShowMsg('规模不能超过 1500，否则浏览器可能崩溃',true);
  const reps=parseInt(document.getElementById('bm_repeatCount').value)||1;
  const btn=document.getElementById('bm_runBtn');btn.disabled=true;btn.textContent='测试中…';
  document.getElementById('bm_resultCard').style.display='';document.getElementById('bm_resultBody').innerHTML='';
  document.getElementById('bm_resultTitle').textContent=`${n} × ${n} 矩阵乘法 · 重复 ${reps} 次`;
  const pw=document.getElementById('bm_progressWrap');pw.classList.add('show');bmSetProgress(0,'正在分配内存…');document.getElementById('bm_msg').className='msg hide';await bmSleep(30);
  let A,B;try{A=randMat(n);B=randMat(n);}catch(e){bmShowMsg('内存分配失败',true);btn.disabled=false;btn.textContent='▶ 开始测试';pw.classList.remove('show');return;}
  const totalSteps=MUL_VERSIONS.length*(1+reps);let step=0;const results=[];
  for(const v of MUL_VERSIONS){
    bmSetProgress((step/totalSteps)*100,`${v.ver} — ${v.tech} ｜ 预热中…`);await bmSleep(20);
    try{MUL_FUNCS[v.id](n,A,B);}catch(e){}step++;
    const times=[];for(let r=0;r<reps;r++){bmSetProgress((step/totalSteps)*100,`${v.ver} — ${v.tech} ｜ 第 ${r+1}/${reps} 次`);const t0=performance.now();MUL_FUNCS[v.id](n,A,B);times.push(performance.now()-t0);step++;await bmSleep(0);}
    results.push({...v,avg:times.reduce((a,b)=>a+b,0)/times.length});
  }
  results.sort((a,b)=>b.avg-a.avg);
  const slowest=results[0].avg,fastest=results[results.length-1].avg;
  const colors=['#ef4444','#f59e0b','#eab308','#22c55e'];
  const rankLabels=['最慢','较慢','较快','最快'];
  document.getElementById('bm_resultBody').innerHTML=results.map((r,i)=>{
    const speedup=slowest/r.avg,barPct=(r.avg/slowest)*100;
    const isWorst=i===0,isBest=i===results.length-1;
    return `<tr><td><span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.75rem;font-weight:700;color:#fff;background:${colors[i]};margin-right:6px;">${rankLabels[i]}</span><span class="ver">${r.ver}</span></td><td class="tech">${r.tech}</td><td class="speed" style="color:${colors[i]}">${speedup.toFixed(2)}×</td><td class="bar-cell"><div class="bar-wrap"><span class="bar-label" style="color:${colors[i]}">${bmFmt(r.avg)}</span><div class="bar-outer"><div class="bar" style="width:${barPct}%;background:${colors[i]}"></div></div></div></td></tr>`;
  }).join('');
  bmSetProgress(100,'测试完成 ✓');btn.disabled=false;btn.textContent='▶ 重新测试';
  bmShowMsg(`${n}×${n} 测试完成 · 最快版本加速 ${(slowest/fastest).toFixed(2)}×`,false);
}

init();bmUpdateWarn();
</script>
